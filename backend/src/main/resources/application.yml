spring:
  application:
    name: expense-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/expense_tracker
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    issuer: expense-tracker
    secret: ${JWT_SECRET}
    access-ttl: PT15M
    refresh-ttl: P7D
  crypto:
    aes-key: ${FIELD_ENCRYPTION_KEY}
  cors:
    allowed-origins:
      - http://localhost:3000
    allow-credentials: true
  ratelimit:
    default-rpm: 60
    auth-rpm: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
